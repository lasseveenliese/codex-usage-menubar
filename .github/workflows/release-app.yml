name: Release app

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Build app
        run: BUILD_ONLY=1 ./start.command

      - name: Package app
        run: |
          APP_PATH="/private/tmp/codex-usage-menubar-signing/Codex Usage Menubar.app"
          STAGING_DIR="$RUNNER_TEMP/CodexUsageMenubar-dmg"
          DMG_PATH="$RUNNER_TEMP/CodexUsageMenubar.dmg"
          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR"
          cp -R "$APP_PATH" "$STAGING_DIR/"
          ln -s /Applications "$STAGING_DIR/Applications"
          hdiutil create -volname "Codex Usage Menubar" -srcfolder "$STAGING_DIR" -ov -format UDZO "$DMG_PATH"
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest "$DMG_PATH" --clobber
            gh release edit latest --notes "Automated build from $GITHUB_SHA"
          else
            gh release create latest "$DMG_PATH" --title "Latest build" --notes "Automated build from $GITHUB_SHA" --target "$GITHUB_SHA"
          fi
