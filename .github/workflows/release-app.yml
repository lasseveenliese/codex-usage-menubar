name: Release app

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Build app
        run: BUILD_ONLY=1 ./start.command

      - name: Package app
        run: |
          APP_PATH="/private/tmp/codex-usage-menubar-signing/Codex Usage Menubar.app"
          STAGING_DIR="$RUNNER_TEMP/CodexUsageMenubar-dmg"
          DMG_PATH="$RUNNER_TEMP/CodexUsageMenubar.dmg"
          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR"
          cp -R "$APP_PATH" "$STAGING_DIR/"
          ln -s /Applications "$STAGING_DIR/Applications"
          hdiutil create -volname "Codex Usage Menubar" -srcfolder "$STAGING_DIR" -ov -format UDZO "$DMG_PATH"
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

      - name: Create update manifest
        run: |
          UPDATE_MANIFEST="$RUNNER_TEMP/update.json"
          APP_VERSION="$(tr -d '[:space:]' < VERSION)"
          RELEASE_TAG="v$APP_VERSION"
          cat > "$UPDATE_MANIFEST" <<JSON
          {
            "version": "$APP_VERSION",
            "downloadUrl": "https://github.com/lasseveenliese/codex-usage-menubar/releases/download/$RELEASE_TAG/CodexUsageMenubar.dmg",
            "releaseUrl": "https://github.com/lasseveenliese/codex-usage-menubar/releases/tag/$RELEASE_TAG",
            "minimumMacOS": "14.0"
          }
          JSON
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "UPDATE_MANIFEST=$UPDATE_MANIFEST" >> "$GITHUB_ENV"

      - name: Publish versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$DMG_PATH" "$UPDATE_MANIFEST" --clobber
            gh release edit "$RELEASE_TAG" --title "Codex Usage Menubar $APP_VERSION" --notes "Automated build from $GITHUB_SHA" --latest
          else
            gh release create "$RELEASE_TAG" "$DMG_PATH" "$UPDATE_MANIFEST" --title "Codex Usage Menubar $APP_VERSION" --notes "Automated build from $GITHUB_SHA" --target "$GITHUB_SHA" --latest
          fi

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag --force latest "$GITHUB_SHA"
          git push --force origin refs/tags/latest

          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest "$DMG_PATH" "$UPDATE_MANIFEST" --clobber
            gh release edit latest --title "Latest build channel" --notes "Latest build for $RELEASE_TAG from $GITHUB_SHA" --target "$GITHUB_SHA" --latest=false
          else
            gh release create latest "$DMG_PATH" "$UPDATE_MANIFEST" --title "Latest build channel" --notes "Latest build for $RELEASE_TAG from $GITHUB_SHA" --target "$GITHUB_SHA" --latest=false
          fi
