name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Build app
        run: BUILD_ONLY=1 ./start.command

      - name: Verify bundle
        run: codesign --verify --deep --strict --verbose=4 ".build/codex-usage-menubar/Codex Usage Menubar.app"

      - name: Package app
        id: package
        run: |
          APP_PATH=".build/codex-usage-menubar/Codex Usage Menubar.app"
          STAGING_DIR="$RUNNER_TEMP/CodexUsageMenubar-dmg"
          DMG_PATH="$RUNNER_TEMP/CodexUsageMenubar.dmg"
          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR"
          cp -R "$APP_PATH" "$STAGING_DIR/"
          ln -s /Applications "$STAGING_DIR/Applications"
          hdiutil create -volname "Codex Usage Menubar" -srcfolder "$STAGING_DIR" -ov -format UDZO "$DMG_PATH"
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload app artifact
        id: artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-usage-menubar-app
          path: ${{ steps.package.outputs.dmg_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Comment PR download link on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- codex-usage-menubar-artifact -->';
            const body = `${marker}
            Latest app artifact: [CodexUsageMenubar.dmg](${process.env.ARTIFACT_URL})

            Run: ${process.env.RUN_URL}
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(comment => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
        env:
          ARTIFACT_URL: ${{ steps.artifact.outputs.artifact-url }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
